<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Agro-Chamados | Sistema de Informes de Chamados Agrícolas</title>
  <!-- Google Fonts + Font Awesome CDN -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #eef2f5;
      padding: 18px 14px 40px;
      color: #1a2e3f;
    }

    /* Container principal estilo card app */
    .app-card {
      max-width: 560px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 38px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* Header fixo */
    .app-header {
      background: #146B3A;
      padding: 28px 24px 22px;
      color: white;
    }

    .app-header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-header h1 i {
      font-size: 1.9rem;
    }

    .app-header p {
      font-size: 0.8rem;
      opacity: 0.85;
      margin-top: 8px;
    }

    /* telas */
    .screen {
      padding: 24px 20px 32px;
      transition: 0.2s;
    }

    .hidden {
      display: none;
    }

    /* botões globais */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 15px 0;
      border: none;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      background: #f0f3f7;
      color: #146B3A;
      margin-bottom: 14px;
    }

    .btn-primary {
      background: #146B3A;
      color: white;
      box-shadow: 0 6px 12px rgba(20, 107, 58, 0.2);
    }

    .btn-primary:active {
      transform: scale(0.97);
      background: #0e552e;
    }

    .btn-secondary {
      background: #eef2f5;
      color: #2c3e50;
      border: 1px solid #dce5ec;
    }

    /* grade tipos chamado */
    .type-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 16px 0 8px;
    }

    .type-card {
      background: #f9fbfd;
      border-radius: 26px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-weight: 600;
      font-size: 1rem;
      color: #1a2e3f;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
      border: 1px solid #e9edf2;
      transition: 0.08s linear;
      cursor: pointer;
    }

    .type-card i {
      font-size: 1.6rem;
      width: 34px;
      color: #146B3A;
    }

    .type-card:active {
      background: #e9f3ee;
      transform: scale(0.98);
    }

    /* formulário */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #4a627a;
      display: block;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 14px 16px;
      font-size: 0.95rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 28px;
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      transition: 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #146B3A;
      box-shadow: 0 0 0 3px rgba(20, 107, 58, 0.15);
    }

    .row-2 {
      display: flex;
      gap: 12px;
    }
    .row-2 .form-group {
      flex: 1;
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #4a627a;
      margin-bottom: 20px;
      cursor: pointer;
    }

    /* toast e loader */
    .toast-custom {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2f3d;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 500;
      font-size: 0.85rem;
      z-index: 1200;
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
      max-width: 85%;
      text-align: center;
      backdrop-filter: blur(2px);
    }

    .loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(3px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1300;
    }

    .loader-card {
      background: white;
      padding: 20px 32px;
      border-radius: 60px;
      display: flex;
      gap: 12px;
      align-items: center;
      font-weight: 600;
      box-shadow: 0 20px 30px rgba(0,0,0,0.2);
    }
    .loader-card i {
      font-size: 1.8rem;
      animation: spin 0.9s linear infinite;
      color: #146B3A;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    hr {
      margin: 12px 0 18px;
      border: 0;
      height: 1px;
      background: #e2edf2;
    }

    small {
      font-size: 0.7rem;
      color: #7e8e9c;
    }
  </style>
</head>
<body>
<div class="app-card" id="agroApp">
  <div class="app-header">
    <h1><i class="fas fa-seedling"></i> Agro-Chamados</h1>
    <p>Gestão de informes agrícolas · envio direto via WhatsApp</p>
  </div>

  <!-- TELA HOME -->
  <div id="homeScreen" class="screen">
    <button id="newChamadoBtn" class="btn btn-primary"><i class="fas fa-plus-circle"></i> Novo Chamado</button>
    <button id="infoAppBtn" class="btn btn-secondary"><i class="fas fa-info-circle"></i> Sobre o sistema</button>
  </div>

  <!-- TELA SELEÇÃO DE TIPO -->
  <div id="typeScreen" class="screen hidden">
    <button class="back-btn" id="backHomeFromType"><i class="fas fa-arrow-left"></i> Voltar</button>
    <h3 style="margin-bottom: 16px; font-weight: 600;">Selecione o chamado</h3>
    <div id="typesContainer" class="type-grid"></div>
  </div>

  <!-- TELA FORMULÁRIO DINÂMICO -->
  <div id="formScreen" class="screen hidden">
    <button class="back-btn" id="backToType"><i class="fas fa-arrow-left"></i> Voltar</button>
    <h3 id="formDynamicTitle" style="margin-bottom: 20px; font-weight: 700;"></h3>
    <div id="formFieldsArea"></div>
    <button id="submitFormBtn" class="btn btn-primary"><i class="fab fa-whatsapp"></i> Enviar via WhatsApp</button>
    <button id="saveAsDraftBtn" class="btn btn-secondary" style="margin-top: 8px;"><i class="fas fa-save"></i> Salvar Rascunho</button>
  </div>
</div>

<script>
  // ======================== CONFIGURAÇÃO DO WHATSAPP ========================
  // ALTERE AQUI PARA O NÚMERO DO ESTAGIÁRIO (código país + DDD + número, apenas dígitos)
  const NUMERO_ESTAGIARIO = "5519997267309";  // Exemplo Brasil: 55 19 999999999 → "5519999999999"

  // ======================== LISTA DE TIPOS DE CHAMADO (10 itens) ========================
  const tiposChamado = [
    "Fechamento de Ordem de Corte",
    "Alteração Ocupação",
    "Alteração Tipo de Propriedade",
    "Área de Danos",
    "Ativar/Inativar Talhão",
    "Danos Talhão Permanente",
    "Informar Data de Reforma",
    "Reversão de Ordem de Corte",
    "Pós Plantio",
    "Plantio"
  ];

  // Chave do localStorage para rascunho
  const DRAFT_STORAGE_KEY = "agroChamadoDraftV2";

  let currentTicketType = "";

  // DOM elements
  const homeScreen = document.getElementById('homeScreen');
  const typeScreen = document.getElementById('typeScreen');
  const formScreen = document.getElementById('formScreen');
  const typesContainer = document.getElementById('typesContainer');
  const formFieldsArea = document.getElementById('formFieldsArea');
  const formDynamicTitle = document.getElementById('formDynamicTitle');
  const submitBtn = document.getElementById('submitFormBtn');
  const saveDraftBtn = document.getElementById('saveAsDraftBtn');

  // ========== UTILIDADES UI ==========
  function showToast(message, duration = 2700) {
    let existing = document.querySelector('.toast-custom');
    if(existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast-custom';
    toast.innerHTML = `<i class="fas fa-leaf" style="margin-right: 8px;"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }, duration);
  }

  function showLoader() {
    if(document.querySelector('.loader-overlay')) return;
    const overlay = document.createElement('div');
    overlay.className = 'loader-overlay';
    overlay.innerHTML = `<div class="loader-card"><i class="fas fa-spinner"></i> Enviando chamado...</div>`;
    document.body.appendChild(overlay);
  }

  function hideLoader() {
    const loader = document.querySelector('.loader-overlay');
    if(loader) loader.remove();
  }

  // validação campos obrigatórios: verifica se ao menos os principais com valor vazio
  function validateRequiredFields() {
    const allInputs = document.querySelectorAll('#formFieldsArea input, #formFieldsArea select, #formFieldsArea textarea');
    const emptyFields = Array.from(allInputs).filter(field => field.value.trim() === "" && field.hasAttribute('required') === false);
    // vamos deixar flexível: alerta apenas se os 3 primeiros campos de texto estiverem vazios? melhor alerta genérico mas não bloqueia totalmente.
    const criticalEmpty = Array.from(allInputs).filter(f => f.value.trim() === "" && f.type !== "button");
    if(criticalEmpty.length > 3) {
      if(!confirm("Atenção: vários campos estão vazios. Deseja enviar mesmo assim?")) return false;
    }
    return true;
  }

  // ========== MONTAGEM DE FORMULÁRIOS POR TIPO ==========
  function getFormHtmlByType(type) {
    switch(type) {
      case "Fechamento de Ordem de Corte":
        return `
          <div class="form-group"><label>Unidade de moagem de cana</label><input id="unidadeMoagem" placeholder="Ex: Usina Agrocenter"></div>
          <div class="row-2"><div class="form-group"><label>Fechar ordem</label><select id="fecharOrdem"><option>MUDA</option><option>MOAGEM</option></select></div><div class="form-group"><label>Nº ordem corte</label><input id="numOrdemCorte"></div></div>
          <div class="form-group"><label>Código de fundo</label><input id="codFundo"></div>
          <div class="row-2"><div class="form-group"><label>Nº zona</label><input id="zonaFechamento"></div><div class="form-group"><label>Talhão</label><input id="talhaoFechamento"></div></div>
          <div class="form-group"><label>Fechamento manual</label><select id="fechamentoManual"><option>Sim</option><option>Não</option></select></div>
          <div class="form-group"><label>Tipo de estimativa</label><select id="tipoEstimativa"><option>Colheita</option><option>Muda</option></select></div>
          <div class="form-group"><label>Observações</label><textarea id="obsEstimativaGeral" rows="2"></textarea></div>
        `;
      case "Alteração Ocupação":
        return `<div class="row-2"><div class="form-group"><label>Fazenda</label><input id="fazendaOcup"></div><div class="form-group"><label>Zona</label><input id="zonaOcup"></div></div>
                <div class="form-group"><label>Talhão</label><input id="talhaoOcup"></div>
                <div class="form-group"><label>Tipo de ocupação</label><select id="tipoOcupacao"><option>Devolução</option><option>Devolução (Subarrendamento Longo Prazo)</option><option>Repasse</option></select></div>`;
      case "Alteração Tipo de Propriedade":
        return `<div class="row-2"><div><label>Código fazenda</label><input id="codFazendaProp"></div><div><label>Zona</label><input id="zonaProp"></div></div>
                <div><label>Talhão</label><input id="talhaoProp"></div><div class="row-2"><div><label>Variedade</label><input id="variedadeProp"></div><div><label>Estágio</label><input id="estagioProp"></div></div>
                <div><label>Tipo da propriedade</label><input id="tipoPropriedade" placeholder="Ex: Arrendada"></div><div><label>Módulo Administrativo</label><input id="moduloAdm"></div>
                <div><label>Distância usina-fazenda (km)</label><input type="number" id="distanciaKm"></div><div><label>Ocupação anterior</label><input id="ocupacaoAnterior"></div>
                <div class="row-2"><div><label>Espaçamento</label><input id="espacamentoProp"></div><div><label>Ciclo desenvolvimento</label><input id="cicloDesenv"></div></div>
                <div><label>Novo tipo de propriedade</label><input id="novoTipoProp"></div><div class="row-2"><div><label>Ambiente produção</label><input id="ambienteProducao"></div><div><label>Ambiente manejo</label><input id="ambienteManejo"></div></div>
                <div><label>Frente</label><input id="frentePropriedade"></div>`;
      case "Área de Danos":
        return `<div><label>Código Fundo Agrícola</label><input id="fundoDanos"></div><div><label>Zona</label><input id="zonaDanos"></div>
                <div><label>Talhão</label><input id="talhaoDanos"></div><div><label>Tipo de danos</label><textarea rows="2" id="tipoDanosDesc"></textarea></div>`;
      case "Ativar/Inativar Talhão":
        return `<div class="row-2"><div><label>Código Fazenda</label><input id="codFazendaAtivar"></div><div><label>Zona</label><input id="zonaAtivar"></div></div>
                <div><label>Talhão</label><input id="talhaoAtivar"></div><div><label>Área (ha)</label><input type="number" step="0.01" id="areaAtivar"></div>
                <div><label>Número do contrato</label><input id="numContrato"></div><div><label>Data de vencimento do contrato</label><input type="date" id="dataVencimento"></div>
                <div><label>Impacto na safra</label><select id="impactoSafra"><option>Safra atual</option><option>Safra atual + futura</option><option>Safra futura</option></select></div>`;
      case "Danos Talhão Permanente":
        return `<div class="row-2"><div><label>Fundo agrícola</label><input id="fundoDanoPerm"></div><div><label>Zona</label><input id="zonaDanoPerm"></div></div>
                <div><label>Talhão</label><input id="talhaoDanoPerm"></div><div class="row-2"><div><label>Área de danos</label><input id="areaDanosHa"></div><div><label>Área de produção</label><input id="areaProducaoHa"></div></div>
                <div><label>Grupo dano</label><input id="grupoDano"></div><div><label>Descrição</label><textarea rows="2" id="descricaoDano"></textarea></div>
                <div><label>Motivo dano</label><input id="motivoDano"></div><div><label>Observação</label><textarea id="obsDanoPerm" rows="2"></textarea></div>`;
      case "Informar Data de Reforma":
        return `<div class="row-2"><div><label>Fundo</label><input id="fundoReforma"></div><div><label>Zona</label><input id="zonaReforma"></div></div>
                <div><label>Talhão</label><input id="talhaoReforma"></div><div><label>Tipo de plantio</label><select id="tipoPlantioReforma"><option>Cana planta</option><option>Soca</option></select></div>
                <div><label>Variedade</label><input id="variedadeReforma"></div><div><label>Espaçamento</label><input id="espacamentoReforma"></div><div><label>Data de reforma</label><input type="date" id="dataReforma"></div>`;
      case "Reversão de Ordem de Corte":
        return `<div><label>Nº Ordem de Corte</label><input id="numOrdemRev"></div><div><label>Código do fundo</label><input id="fundoRev"></div>
                <div class="row-2"><div><label>Zona</label><input id="zonaRev"></div><div><label>Nº talhão</label><input id="talhaoRev"></div></div>
                <div><label>Motivo da reversão</label><textarea rows="2" id="motivoReversao"></textarea></div>`;
      case "Pós Plantio":
        return `<div><label>Unidade produtora</label><input id="unidadeProdutora"></div><div><label>Código fazenda</label><input id="codFazendaPos"></div>
                <div class="row-2"><div><label>Código zona</label><input id="zonaPos"></div><div><label>Talhão</label><input id="talhaoPos"></div></div>
                <div><label>Tipo Gestão</label><select id="tipoGestao"><option>FOCA</option><option>Repasse</option></select></div>`;
      case "Plantio":
        return `<div><label>Fazenda</label><input id="fazendaPlantio"></div><div><label>Sistema de plantio</label><input id="sistemaPlantio"></div>
                <div class="row-2"><div><label>Espaçamento</label><input id="espacamentoPlantio"></div><div><label>Ciclo desenvolvimento</label><input id="cicloPlantio"></div></div>
                <div class="row-2"><div><label>Zona</label><input id="zonaPlantio"></div><div><label>Variedade</label><input id="variedadePlantio"></div></div>
                <div class="row-2"><div><label>Talhão</label><input id="talhaoPlantio"></div><div><label>Área (ha)</label><input type="number" step="0.1" id="areaHaPlantio"></div></div>
                <div class="row-2"><div><label>Frente</label><input id="frentePlantio"></div><div><label>Quantidade de pessoas</label><input type="number" id="qtdPessoasPlantio"></div></div>
                <div><label>Área restante (ha)</label><input type="number" step="0.1" id="areaRestantePlantio"></div>`;
      default: return `<p>Formulário não disponível</p>`;
    }
  }

  // Coleta todos os dados dos campos do form atual
  function collectFormData() {
    const fields = document.querySelectorAll('#formFieldsArea input, #formFieldsArea select, #formFieldsArea textarea');
    let dataObj = {};
    fields.forEach(field => {
      if(field.id) dataObj[field.id] = field.value;
      else dataObj[field.name || 'campo'] = field.value;
    });
    return dataObj;
  }

  // Preenche formulário a partir de um rascunho salvo
  function restoreDraftToForm(draft) {
    if(!draft || draft.tipo !== currentTicketType) return false;
    const dados = draft.dados;
    for(let [key, value] of Object.entries(dados)) {
      const inputEl = document.getElementById(key);
      if(inputEl) inputEl.value = value;
    }
    showToast("Rascunho carregado automaticamente ✔️");
    return true;
  }

  function saveCurrentDraft() {
    const formData = collectFormData();
    const draft = {
      tipo: currentTicketType,
      dados: formData,
      timestamp: Date.now()
    };
    localStorage.setItem(DRAFT_STORAGE_KEY, JSON.stringify(draft));
    showToast("Rascunho salvo com sucesso!");
  }

  function tryLoadDraftOnEnter() {
    const raw = localStorage.getItem(DRAFT_STORAGE_KEY);
    if(raw) {
      try {
        const draft = JSON.parse(raw);
        if(draft.tipo === currentTicketType) {
          restoreDraftToForm(draft);
        }
      } catch(e) {}
    }
  }

  // Montar mensagem WhatsApp a partir dos dados
  function generateWhatsAppMessage() {
    const formData = collectFormData();
    let msg = `🍃 *CHAMADO AGRÍCOLA: ${currentTicketType}*%0A%0A`;
    for(let [key, value] of Object.entries(formData)) {
      if(value && value.trim() !== "") {
        let label = key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase()).replace(/Id/g, 'ID');
        msg += `📌 *${label}:* ${value.trim()}%0A`;
      }
    }
    msg += `%0A📅 Enviado via Agro-Chamados - Gestão Agrícola`;
    return msg;
  }

  function openWhatsApp() {
    const messageText = generateWhatsAppMessage();
    const url = `https://wa.me/${NUMERO_ESTAGIARIO}?text=${messageText}`;
    window.open(url, '_blank');
    showToast("Redirecionando para o WhatsApp...");
  }

  function handleSubmit() {
    if(!validateRequiredFields()) return;
    showLoader();
    setTimeout(() => {
      openWhatsApp();
      hideLoader();
    }, 300);
  }

  // ========== NAVEGAÇÃO E RENDER ==========
  function renderTypeSelection() {
    typesContainer.innerHTML = "";
    tiposChamado.forEach(tipo => {
      const card = document.createElement('div');
      card.className = 'type-card';
      let iconHtml = '<i class="fas fa-clipboard-list"></i>';
      if(tipo.includes("Fechamento")) iconHtml = '<i class="fas fa-cut"></i>';
      else if(tipo.includes("Ocupação")) iconHtml = '<i class="fas fa-exchange-alt"></i>';
      else if(tipo.includes("Propriedade")) iconHtml = '<i class="fas fa-building"></i>';
      else if(tipo.includes("Danos")) iconHtml = '<i class="fas fa-tree"></i>';
      else if(tipo.includes("Ativar")) iconHtml = '<i class="fas fa-toggle-on"></i>';
      else if(tipo.includes("Permanente")) iconHtml = '<i class="fas fa-exclamation-triangle"></i>';
      else if(tipo.includes("Reforma")) iconHtml = '<i class="fas fa-calendar-alt"></i>';
      else if(tipo.includes("Reversão")) iconHtml = '<i class="fas fa-undo-alt"></i>';
      else if(tipo.includes("Pós Plantio")) iconHtml = '<i class="fas fa-seedling"></i>';
      else if(tipo.includes("Plantio")) iconHtml = '<i class="fas fa-tractor"></i>';
      card.innerHTML = `${iconHtml}<span>${tipo}</span>`;
      card.addEventListener('click', () => openFormForType(tipo));
      typesContainer.appendChild(card);
    });
  }

  function openFormForType(type) {
    currentTicketType = type;
    formDynamicTitle.innerText = type;
    const formHtml = getFormHtmlByType(type);
    formFieldsArea.innerHTML = formHtml;
    // alterna telas
    homeScreen.classList.add('hidden');
    typeScreen.classList.add('hidden');
    formScreen.classList.remove('hidden');
    // tenta carregar rascunho compatível
    tryLoadDraftOnEnter();
  }

  function goToHome() {
    homeScreen.classList.remove('hidden');
    typeScreen.classList.add('hidden');
    formScreen.classList.add('hidden');
    currentTicketType = "";
  }

  function goToTypeSelection() {
    homeScreen.classList.add('hidden');
    typeScreen.classList.remove('hidden');
    formScreen.classList.add('hidden');
    renderTypeSelection();
  }

  // EVENTOS PRINCIPAIS
  document.getElementById('newChamadoBtn').addEventListener('click', goToTypeSelection);
  document.getElementById('infoAppBtn').addEventListener('click', () => {
    showToast("Sistema AgroChamados - versão 2.0 · Envio direto WhatsApp");
    alert("AgroChamados Profissional\nConfigure o número do estagiário no código (NUMERO_ESTAGIARIO).\nPara GitHub Pages: use apenas este arquivo.");
  });
  document.getElementById('backHomeFromType').addEventListener('click', goToHome);
  document.getElementById('backToType').addEventListener('click', goToTypeSelection);
  submitBtn.addEventListener('click', handleSubmit);
  saveDraftBtn.addEventListener('click', saveCurrentDraft);
